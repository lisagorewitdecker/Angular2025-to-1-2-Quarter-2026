name: Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find-projects:
    name: Find Angular Projects
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Angular project directories
        id: find
        run: |
          dirs=$(find . -name "angular.json" -not -path "*/node_modules/*" -exec dirname {} \; | sort | jq -R . | jq -s -c .)
          echo "matrix=${dirs}" >> "$GITHUB_OUTPUT"

  angular-doctor:
    name: Angular Doctor (${{ matrix.directory }})
    needs: find-projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: ${{ fromJSON(needs.find-projects.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Angular Doctor
        uses: antonygiomarxdev/angular-doctor@v1.3.0
        with:
          # Project directory to scan
          directory: ${{ matrix.directory }}
          # Show file details per rule
          verbose: true
          # Exit with error code when score is below this threshold (0-100)
          score-threshold: 0
          # Node.js version to use
          node-version: 20
