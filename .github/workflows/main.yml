name: Quality Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  angular-doctor:
    name: Run Angular Doctor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Angular Doctor
        uses: antonygiomarxdev/angular-doctor@v1.3.0
        with:
          # Project directory to scan
          directory: .
          # Show file details per rule
          verbose: true
          # Exit with error code when score is below this threshold (0-100)
          score-threshold: 0
          # Node.js version to use
          node-version: 20